<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Поиск заказов с задержкой</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    #order-search {
      width: 100%;
      padding: 8px 30px 8px 10px;
      font-size: 16px;
      max-width: 400px;
      margin-bottom: 10px;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      display: none;
    }

    .search-container {
      position: relative;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 6px;
      display: none;
    }

    .order {
      position: relative;
      padding: 14px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      margin: 6px 0;
      transition: opacity 0.2s;
      user-select: none;
    }

    .order:hover {
      opacity: 0.95;
    }

    .new { background: #3498db; }
    .cooking { background: #f39c12; }
    .delivery { background: #9b59b6; }
    .delivered { background: #2ecc71; }

    .order-title, .order-comment {
      margin: 4px 0;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>Поиск заказов с задержкой</h2>

  <div class="search-container">
    <input type="text" id="order-search" placeholder="Поиск по ID, заголовку или клиенту" />
    <span class="search-clear">✕</span>
    <div id="search-error" class="error-message"></div>
  </div>

  <div id="orders"></div>
</body>
</html>
