<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Избранные заказы</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .order {
      background: white;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 10px;
      position: relative;
      transition: transform 0.3s ease;
    }

    .order.favorite {
      background: #ffe0e0;
      transform: scale(1.05);
    }

    .favorite-button {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      transition: transform 0.2s;
    }

    .favorite-button.favorite {
      color: red;
    }
  </style>
</head>
<body>

<h2>Избранные заказы</h2>

<div id="orders">
  <div class="order">
    Заказ #A-101
    <button class="favorite-button">❤</button>
  </div>

  <div class="order">
    Заказ #A-102
    <button class="favorite-button">❤</button>
  </div>
</div>

<script src="task.js"></script>
<script>
  setupFavoriteHandler(document.getElementById('orders'));
</script>

</body>
</html>
