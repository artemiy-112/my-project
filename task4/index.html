<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Анимация "Избранное"</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .order {
      background: white;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 10px;
      color: black;
      font-weight: bold;
      position: relative;
      transition: transform 0.3s ease;
      user-select: none;
    }

    .favorite {
      background: #ffe0e0;
      transform: scale(1.05);
    }

    .favorite-button {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
    }

    .favorite-button.favorite {
      color: red;
    }
  </style>
</head>
<body>
  <h2>Анимация «Избранное»</h2>

  <div id="orders">
    <div class="order">
      Заказ #A-101
      <button class="favorite-button" title="Добавить в избранное">❤</button>
    </div>

    <div class="order">
      Заказ #A-102
      <button class="favorite-button" title="Добавить в избранное">❤</button>
    </div>
  </div>
</body>
</html>
